# Example configuration for redis-to-aerospike.
#
# Pass it with:  redis-to-aerospike --config config.example.yaml
#
# The file is OPTIONAL. When provided it is the BASE configuration; any flag you
# also pass on the command line overrides the matching value here. Every key is
# optional too -- anything you omit falls back to the built-in default shown in
# the comments.

redis:
  host: localhost          # default: localhost
  port: 6379               # default: 6379
  db: 0                    # default: 0 (ignored in cluster mode, which uses db 0)

  # Connection URL. When set it is the SOLE source of truth for the connection
  # target (use rediss:// for TLS) and the discrete host/port/auth/ssl fields
  # below are ignored. Socket timeouts below still apply.
  # url: redis://user:password@localhost:6379/0

  # Redis Cluster (sharded). A single host/port (or url) is enough to seed
  # topology discovery; every shard is scanned. Cluster mode always uses db 0.
  cluster: false           # default: false

  username: null           # ACL username (Redis 6+); default: none
  password: null           # default: none

  # --- TLS ---
  ssl: false               # default: false
  ssl_ca_certs: null       # CA certificate file
  ssl_certfile: null       # mutual TLS: client certificate file
  ssl_keyfile: null        # mutual TLS: client key file
  ssl_cert_reqs: null      # required | optional | none

  # --- Timeouts (seconds) ---
  socket_timeout: null         # default: none
  socket_connect_timeout: null # default: none

  # SCAN MATCH: only keys matching this glob are returned by SCAN (reduces Redis
  # work). Separate from Aerospike set_routes. Default: * (whole keyspace).
  scan_match: "*"          # default: *  (YAML alias: key_pattern if scan_match omitted)

aerospike:
  # Either a single host/port ...
  host: localhost          # default: localhost
  port: 3000               # default: 3000
  # ... or a list of nodes (overrides host/port if present):
  # hosts:
  #   - [node1, 3000]
  #   - [node2, 3000]

  use_services_alternate: false  # use alternate-access address (NAT / cloud / Docker)

  # --- Authentication (Enterprise security-enabled clusters) ---
  username: null           # default: none (no authentication)
  password: null
  auth_mode: internal      # internal | external | external_insecure | pki

  # --- TLS ---
  tls_enable: false        # default: false
  tls_name: null           # server certificate subject name (applied to every host)
  tls_cafile: null         # CA certificate file
  tls_certfile: null       # mutual TLS: client certificate file
  tls_keyfile: null        # mutual TLS: client key file
  tls_keyfile_pw: null     # mutual TLS: client key password

  # --- Timeouts (milliseconds; 0 = client default / no timeout) ---
  socket_timeout_ms: 0     # default: 0
  total_timeout_ms: 0      # default: 0
  connect_timeout_ms: 1000 # default: 1000
  login_timeout_ms: 5000   # default: 5000

  namespace: test          # default: test
  set_name: redis          # default: redis (keys that match no set_routes use this set)
  # Optional: map Redis key globs to Aerospike sets (first match wins). Does not
  # change SCAN; combine with redis.scan_match to limit which keys are read.
  # With a single * in the pattern, the Aerospike user key is the part that matched
  # the star (literals outside * are removed); multiple * / ? / [ keep the full Redis key.
  # set_routes:
  #   - pattern: "user:*"
  #     destination: users
  #   - pattern: "session:*"
  #     destination: sessions
  value_bin: value         # bin name for single-value records; default: value

  send_key: false                # store the primary key alongside the record
  # When the Aerospike record already exists: merge bins (update), full replace,
  # or skip (create_only; counted as skipped in the summary).
  # record_exists_policy: update   # update | replace | create_only

  # max_record_size: 8388608   # default: 8 MiB; reject oversized payloads before write
  max_ttl: 315360000       # max record TTL in seconds (10y); 0 disables the check

# --- Pipeline ---
workers: 8                 # default: 8
scan_batch: 500            # default: 500
queue_size: 10000          # default: 10000

# Optional throttles in records/second; 0 (default) means unlimited. Use these
# to avoid overwhelming a busy source or target. Each allows a short burst of up
# to one second's worth of the configured rate.
scan_rate_limit: 0         # max records/sec pulled from Redis (throttles SCAN)
write_rate_limit: 0        # max records/sec written to Aerospike (all workers)

# Records per Aerospike batch_write. >1 inserts in batches (fewer round-trips);
# each record keeps its own TTL and is checked individually. The write rate
# limit still counts individual records. 1 = one write per record (default).
write_batch_size: 1

hash_strategy: map_bin     # map_bin | field_bins
ttl_overflow_policy: reject  # reject | clamp | never_expire
progress_interval: 10.0    # seconds between progress lines; 0 disables
