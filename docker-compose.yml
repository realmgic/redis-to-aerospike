services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  valkey:
    image: valkey/valkey:8
    ports:
      - "6380:6379"

  aerospike:
    image: aerospike/aerospike-server-enterprise:latest
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    environment:
      # Use a small in-memory namespace named "test" for local experimentation.
      NAMESPACE: test
